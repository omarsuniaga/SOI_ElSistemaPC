    #pm-loading-splash {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fbfbfd;
      animation: fadeIn 0.5s ease;
      padding: 2rem;
      text-align: center;
    }

    .pm-loading-icon {
      width: 72px;
      height: 72px;
      margin-bottom: 32px;
      animation: pm-breathe 2s ease-in-out infinite;
    }

    .pm-loading-icon svg {
      width: 100%;
      height: 100%;
    }

    .pm-loading-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(0, 122, 255, 0.12);
      border-top-color: #007aff;
      border-radius: 50%;
      animation: pm-spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      margin-bottom: 20px;
    }

    .pm-loading-text {
      color: #1d1d1f;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .pm-loading-greeting {
      color: #1d1d1f;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 2px;
      min-height: 1.2em;
    }

    .pm-loading-sub {
      color: #86868b;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: -0.01em;
      min-height: 1.2em;
    }

    .pm-loading-progress {
      width: 120px;
      height: 3px;
      background: rgba(0, 122, 255, 0.12);
      border-radius: 2px;
      margin-top: 32px;
      overflow: hidden;
    }

    .pm-loading-progress-bar {
      height: 100%;
      width: 0%;
      background: #007aff;
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(0.22,1,0.36,1);
    }

    @keyframes pm-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pm-breathe {
      0%, 100% { opacity: 0.6; transform: scale(0.97); }
      50% { opacity: 1; transform: scale(1); }
    }

    @media (prefers-color-scheme: dark) {
      body { background: #000000; }
      #pm-loading-splash { background: #000000; }
      .pm-loading-text { color: #f5f5f7; }
      .pm-loading-greeting { color: #f5f5f7; }
      .pm-loading-sub { color: #6e6e73; }
    }

    @media (prefers-reduced-motion: reduce) {
      .pm-loading-icon { animation: none; }
      .pm-loading-spinner { animation: none; border-top-color: transparent; }
    }
