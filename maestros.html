<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#5856D6" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />
  <title>Portal Maestros - SOI</title>
  
  <!-- PWA Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SOI Maestros" />
  <meta name="application-name" content="SOI Maestros" />
  <meta name="msapplication-TileColor" content="#5856D6" />
  <meta name="msapplication-config" content="none" />
  
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #ffffff; }
    #portal-app { min-height: 100vh; }
    .pm-loading-splash { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      background: #fbfbfd;
      animation: fadeIn 0.5s ease;
    }
    .pm-spinner { 
      width: 44px; 
      height: 44px; 
      border: 3.5px solid rgba(0, 122, 255, 0.15); 
      border-top-color: #007aff; 
      border-radius: 50%; 
      animation: pm-spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
    }
    @keyframes pm-spin { 
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); } 
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .pm-loading-text { 
      margin-top: 24px; 
      color: #1d1d1f; 
      font-size: 15px; 
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    /* Admin Bridge */
    .admin-bridge {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      opacity: 0.8; /* Aumentada opacidad base */
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.1); /* Más oscuro para fondo claro */
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(0, 0, 0, 0.2);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .admin-bridge:hover {
      opacity: 1;
      background: rgba(0, 0, 0, 0.15);
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .admin-bridge svg {
      color: #1d1d1f;
    }

    .admin-bridge span {
      color: #1d1d1f;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <a href="#portal-app" class="pm-skip-link">Saltar al contenido principal</a>
  <div id="portal-app" tabindex="-1">
    <div class="pm-loading-splash">
      <div class="pm-spinner"></div>
      <div class="pm-loading-text">Cargando Portal Maestros...</div>
    </div>
  </div>

  <!-- Admin Bridge Link -->
  <a href="/admin.html" class="admin-bridge" title="Panel de Administración">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
    </svg>
    <span>Admin</span>
  </a>

  <script type="module" src="/src/main-maestros.js"></script>
</body>
</html>
