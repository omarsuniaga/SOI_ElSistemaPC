    .pm-loader-container {

      align-items: center;
      justify-content: center;
      height: 100vh;
      animation: fadeIn 0.5s ease;
    }

    .pm-loader-spinner {
      width: 44px;
      height: 44px;
      border: 3.5px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {

      to { opacity: 1; }
    }

    .pm-loader-text {
      margin-top: 24px;
