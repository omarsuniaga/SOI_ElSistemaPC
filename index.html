<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#007aff" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <title>Portal Maestros — SOI</title>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    #portal-app {
      min-height: 100vh;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="portal-app">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
      <div style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <div style="margin-top: 20px; color: white; font-size: 14px;">Cargando...</div>
    </div>
  </div>
  <script type="module" src="/src/main-maestros.js"></script>
</body>
</html>
