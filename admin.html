  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      /* Degradado Admin: Indigo a Violeta */
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      min-height: 100vh;
      color: #ffffff;
    }

    #app {
      min-height: 100vh;
    }

    .admin-loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      animation: fadeIn 0.5s ease;
    }

    .admin-loader-spinner {
      width: 44px;
      height: 44px;
      border: 3.5px solid rgba(255, 255, 255, 0.2);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .admin-loader-text {
      margin-top: 24px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* Teacher Bridge (Back to Portal Maestros) */
    .teacher-bridge {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      opacity: 0.8;
      /* Aumentada opacidad base */
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.25);
      /* Más sólido */
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      /* Sombra para profundidad */
      /* Hidden by default - shown only on main page via JS */
      display: none;
    }

    .teacher-bridge.visible {
      display: flex;
    }

    .teacher-bridge:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.35);
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .teacher-bridge svg {
      color: white;
    }

    .teacher-bridge span {
      color: white;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
    }
  </style>
