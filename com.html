<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#db2777" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <title>Portal Comunicaciones - SOI</title>
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    #app { min-height: 100vh; }
    .pm-loading-splash { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fbfbfd; }
    .pm-spinner { width: 44px; height: 44px; border: 3.5px solid rgba(219,39,119,0.15); border-top-color: #db2777; border-radius: 50%; animation: pm-spin 0.8s cubic-bezier(0.4,0,0.2,1) infinite; }
    @keyframes pm-spin { to { transform: rotate(360deg); } }
    .pm-loading-text { margin-top: 24px; color: #1d1d1f; font-size: 15px; font-weight: 500; }
  </style>
</head>
<body>
  <div id="app">
    <div class="pm-loading-splash">
      <div class="pm-spinner"></div>
      <div class="pm-loading-text">Cargando Portal Comunicaciones...</div>
    </div>
  </div>
  <script type="module" src="/src/portales/com/com.js"></script>
</body>
</html>
