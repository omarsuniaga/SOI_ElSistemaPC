<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#007aff" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <title>Portal Maestros — SOI</title>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
    #portal-app { min-height: 100vh; }
    .pm-loading-splash { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .pm-spinner { width: 40px; height: 40px; border: 3px solid #e0e0e0; border-top-color: #007aff; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pm-loading-text { margin-top: 20px; color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div id="portal-app">
    <div class="pm-loading-splash">
      <div class="pm-spinner"></div>
      <div class="pm-loading-text">Cargando Portal Maestros...</div>
    </div>
  </div>
  <script type="module" src="/src/main-maestros.js"></script>
</body>
</html>
