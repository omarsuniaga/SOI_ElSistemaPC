<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#007aff" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <title>Portal Maestros — SOI</title>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #ffffff; }
    #portal-app { min-height: 100vh; }
    .pm-loading-splash { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      background: #fbfbfd;
      animation: fadeIn 0.5s ease;
    }
    .pm-spinner { 
      width: 44px; 
      height: 44px; 
      border: 3.5px solid rgba(0, 122, 255, 0.15); 
      border-top-color: #007aff; 
      border-radius: 50%; 
      animation: pm-spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; 
    }
    @keyframes pm-spin { 
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); } 
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .pm-loading-text { 
      margin-top: 24px; 
      color: #1d1d1f; 
      font-size: 15px; 
      font-weight: 500;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>
  <div id="portal-app">
    <div class="pm-loading-splash">
      <div class="pm-spinner"></div>
      <div class="pm-loading-text">Cargando Portal Maestros...</div>
    </div>
  </div>
  <script type="module" src="/src/main-maestros.js"></script>
</body>
</html>
